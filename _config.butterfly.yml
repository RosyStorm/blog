# ============================================================
# _config.butterfly.yml  仿 biojuse.com 主题配置
# 字段名严格对齐 butterfly 4.x/5.x
# ============================================================

# ---------- 导航菜单 ----------
menu:
  首页: / || fas fa-home
  文章||fas fa-list:
    归档: /archives/ || fas fa-archive
    标签: /tags/ || fas fa-tags
    分类: /categories/ || fas fa-folder-open
  留言板: /messageboard/ || fas fa-comment-dots
  友链: /link/ || fas fa-link
  我自己: https://github.com/RosyStorm || fas fa-user
  关于: /about/ || fas fa-info-circle
  杂项||fas fa-th-large:
    琐碎日常: /daily/ || fas fa-coffee
    更新日志: /changelog/ || fas fa-history

nav:
  display_title: true
  display_post_title: true
  fixed: false

# ---------- 代码块 ----------
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# ---------- 社交 ----------
social:
  fab fa-github: https://github.com/RosyStorm || Github || '#24292e'
  fas fa-envelope: mailto:1741426978@qq.com || Email || '#4a7dbe'
  fas fa-rss: /blog/atom.xml || RSS || '#FFA500'

# ---------- 暗黑模式 ----------
darkmode:
  enable: true
  button: true
  autoChangeMode: 1
display_mode: light

# ---------- 主题色（颜色值必须加双引号）----------
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

background: "var(--global-bg)"

# ---------- 侧边栏 ----------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: 清华大学 · 核工程与核技术
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/RosyStorm
  card_announcement:
    enable: true
    content: 欢迎来到颜浩轩的博客！人生是旷野，不是轨道。请保持批判思维，先思考后行动。
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_newest_comments:
    enable: false
    limit: 6
    storage: 10
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    runtime_date: 2026/06/25 00:00:00

# ---------- 封面 ----------
cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - https://picsum.photos/seed/blog1/800/450
    - https://picsum.photos/seed/blog2/800/450
    - https://picsum.photos/seed/blog3/800/450

# ---------- 顶部图 ----------
default_top_img: https://picsum.photos/seed/topimg/1920/1080
index_img: https://picsum.photos/seed/indextop/1920/600
disable_top_img: false

# ---------- 头像 ----------
avatar:
  img: https://avatars.githubusercontent.com/u/185143493?v=4
  effect: false

favicon: https://avatars.githubusercontent.com/u/185143493?v=4

# ---------- 文章 ----------
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

post_copyright:
  enable: true
  decode: false
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

# ---------- 字数统计 ----------
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# ---------- 右下角 ----------
readmode: true
rightside_scroll_percent: true

# ---------- 本地搜索 ----------
search:
  enable: true
  path: search.xml
  field: post
  placeholder: 请输入关键字

# ---------- 访问统计 ----------
busuanzi:
  enable: true
  site_uv: true
  site_pv: true
  page_pv: true

# ---------- inject ----------
inject:
  head:
    - <link rel="stylesheet" href="/blog/css/custom.css">
  bottom:
    - <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Zfour/Butterfly-double-row-display@1.00/cardlistpost.min.css">

# ---------- 评论 ----------
comments:
  use: Giscus
  text: true
  lazyload: false
  count: false
  card_post_count: false

# ---------- Giscus ----------
# repo_id 已填（仓库 node_id）；category_id 已从 giscus.app 生成并填入
giscus:
  repo: RosyStorm/blog
  repo_id: R_kgDOTEt_hA
  category_id: DIC_kwDOTEt_hM4C_3fW
  light_theme: light
  dark_theme: dark
  js:
  option:
    data-category: Announcements
    data-mapping: pathname
    data-strict: '0'
    data-reactions-enabled: '1'
    data-emit-metadata: '0'
    data-input-position: bottom
    data-lang: zh-CN
    data-loading: lazy
